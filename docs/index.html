  <main class="grid">

    <span>2 characters</span>
    <span>&middot;</span>

  <script type="module">
    import { mount } from './assets/viewer.js?v=20260418T203917Z';
    for (const el of document.querySelectorAll('.card-preview')) {
      mount(el, {
        glbUrl: el.dataset.glb,
        mappingUrl: el.dataset.map || null,
        autoRotate: true,
        interactive: false,

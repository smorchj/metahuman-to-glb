<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MetaHuman gallery</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="gallery">
  <header>
    <h1>MetaHuman &rarr; GLB</h1>
    <p class="sub">Characters exported from Unreal Engine to web-ready GLB.</p>
  </header>

  <main class="grid">
    {{cards}}
  </main>

  <footer>
    <span>{{count}} characters</span>
    <span>&middot;</span>
    <span>built {{built_at}}</span>
  </footer>
</body>
</html>
